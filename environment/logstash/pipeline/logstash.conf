input {
  tcp {
    port => 5000
    codec => json_lines  # Spring Boot gửi log dạng JSON (dùng logstash-logback-encoder)
  }
}

filter {
  # Parse timestamp từ Spring Boot log nếu có
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Thêm tag để phân biệt source
  mutate {
    add_field => { "app" => "booking-ticket" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "booking-ticket-logs-%{+YYYY.MM.dd}"  # Index theo ngày, dễ quản lý và xóa log cũ
  }

  # Bật dòng dưới để debug pipeline (in log ra stdout của Logstash container)
  # stdout { codec => rubydebug }
}
