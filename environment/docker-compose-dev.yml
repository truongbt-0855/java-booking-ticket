networks:
  pre-event-network:
    driver: bridge  # Tất cả container trong cùng network này có thể giao tiếp với nhau qua tên container

services:
  mysql:
    image: mysql:8.0
    container_name: pre-event-mysql
    volumes:
      - ./data/db_data:/var/lib/mysql                        # Persist data ra ngoài container, tránh mất data khi container bị xóa
      - ./mysql/init:/docker-entrypoint-initdb.d/            # Script SQL trong folder này sẽ tự chạy khi MySQL khởi tạo lần đầu
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--skip-character-set-client-handshake'  # Buộc tất cả kết nối sử dụng utf8mb4, bỏ qua charset client khai báo
    ]
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: ticket
      MYSQL_PASSWORD: root1234
    ports:
      - "3316:3306"  # host:container — truy cập từ ngoài qua port 3316, tránh xung đột nếu máy đã có MySQL local
    networks:
      - pre-event-network

  redis:
    container_name: pre-event-redis
    image: redislabs/redismod:latest  # Image có sẵn các Redis module (RedisJSON, RediSearch...), nặng hơn redis:alpine
    ports:
      - "6319:6379"  # host:container — truy cập từ ngoài qua port 6319
    networks:
      - pre-event-network

  prometheus:
    container_name: pre-event-prometheus
    image: prom/prometheus:latest
    restart: unless-stopped  # Tự restart khi crash, trừ khi bị stop thủ công
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml  # Mount file config vào container
      - ./data/prometheus_data:/prometheus                          # Persist time-series data
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'  # Cho phép hot reload config qua POST http://localhost:9090/-/reload (không cần restart container)
    extra_hosts:
      - host.docker.internal:host-gateway  # Docker Desktop tự resolve host.docker.internal → Windows host, dùng để scrape Spring Boot chạy trên Windows
    ports:
      - "9090:9090"
    networks:
      - pre-event-network

  grafana:
    container_name: pre-event-grafana
    image: grafana/grafana:latest
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin1234
      - GF_USERS_ALLOW_SIGN_UP=false       # Tắt tự đăng ký, chỉ admin mới tạo được user
      - GF_SERVER_DOMAIN=localhost
      - GF_LOG_MODE=console file           # Ghi log ra cả console lẫn file
      - GF_LOG_FILTER=alerting.notifier.slack:debug alermanagere:debug ngalert:debug  # Tăng log level cho alerting để debug
    restart: unless-stopped
    volumes:
      - ./data/grafana_data:/var/lib/grafana  # Persist dashboards, datasources, users
    ports:
      - "3000:3000"
    networks:
      - pre-event-network

  node-exporter:
    container_name: pre-event-node-exporter
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      # Mount filesystem của host vào container ở chế độ read-only (ro) để node-exporter đọc metrics
      # Trên Docker Desktop/Windows: đây là filesystem của WSL2 VM, không phải Windows host
      - /proc:/host/proc:ro    # Thông tin process của Linux kernel
      - /sys:/host/sys:ro      # Thông tin hardware/kernel
      - /:/rootfs:ro           # Root filesystem để đọc disk usage
    command:
      - --path.procfs=/host/proc   # Chỉ node-exporter đọc /proc từ đường dẫn mount ở trên
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)  # Bỏ qua các mount point hệ thống, chỉ đo disk thật
    ports:
      - "9100:9100"
    networks:
      - pre-event-network

  mysqld-exporter:
    container_name: pre-event-mysqld-exporter
    image: prom/mysqld-exporter:latest
    restart: unless-stopped
    command:
      # Các collector được bật thêm ngoài mặc định — mỗi cái expose thêm một nhóm metrics MySQL
      - '--collect.engine_innodb_status'              # InnoDB engine status (lock, buffer pool...)
      - '--collect.info_schema.processlist'           # Danh sách query đang chạy
      - '--collect.info_schema.tables'                # Kích thước từng table
      - '--collect.info_schema.tables.databases=ticket'  # Chỉ collect table stats của DB "ticket", bỏ qua information_schema, mysql, sys, performance_schema
      - '--collect.info_schema.query_response_time'   # Phân bố thời gian response của query
      - '--collect.perf_schema.file_events'           # I/O events từ performance_schema
      - '--collect.perf_schema.eventsstatements'      # Thống kê các câu SQL
      - '--collect.perf_schema.indexiowaits'          # Thời gian chờ I/O theo index
      - '--collect.global_status'                     # Global status variables của MySQL
      - '--config.my-cnf=/etc/mysql/.my.cnf'          # File chứa thông tin kết nối MySQL
    volumes:
      - ./mysqld-exporter/.my.cnf:/etc/mysql/.my.cnf  # File config credentials kết nối MySQL (cần tạo thủ công)
    environment:
      # Port phải là 3306 (port nội bộ container MySQL), không phải 3316 (port host)
      # Vì mysqld-exporter và mysql cùng network, giao tiếp qua tên container
      - DATA_SOURCE_NAME=root:root1234@tcp(mysql:3306)/
    ports:
      - "9104:9104"
    depends_on:
      - mysql  # Đảm bảo MySQL start trước mysqld-exporter
    networks:
      - pre-event-network

  redis-exporter:
    container_name: pre-event-redis-exporter
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis:6379    # Tên container Redis + port nội bộ (không dùng host port 6319)
      - REDIS_PASSWORD=          # Để trống vì Redis chưa cấu hình requirepass
    command:
      - '--web.listen-address=:9121'  # Port để expose metrics cho Prometheus scrape
    ports:
      - "9121:9121"
    depends_on:
      - redis  # Đảm bảo Redis start trước redis-exporter
    networks:
      - pre-event-network

  # ======================== ELK Stack ========================
  # Flow tổng quát:
  #   Spring Boot  →(JSON logs via TCP:5044)→  Logstash  →(parsed logs)→  Elasticsearch  ←  Kibana
  #
  #   1. Spring Boot dùng logstash-logback-encoder gửi log dạng JSON qua TCP đến Logstash
  #   2. Logstash nhận, parse, rồi đẩy vào Elasticsearch theo index theo ngày (pre-ticket-YYYY.MM.dd)
  #   3. Kibana kết nối vào Elasticsearch để visualize, search, tạo dashboard từ log đó

  elasticsearch:
    container_name: pre-event-elasticsearch
    image: elasticsearch:9.3.2
    restart: unless-stopped
    environment:
      - discovery.type=single-node  # Chạy 1 node duy nhất, không cần bầu chọn master như cluster
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # Giới hạn JVM heap — tránh ES chiếm toàn bộ RAM máy dev
    volumes:
      - ./elk/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml  # Override config mặc định
      - ./data/elasticsearch_data:/usr/share/elasticsearch/data  # Persist index data, tránh mất log khi restart
    ports:
      - "9200:9200"  # REST API — Kibana và client dùng port này để query
      - "9300:9300"  # Transport port — giao tiếp nội bộ giữa các node (chỉ cần thiết khi scale thành cluster)
    networks:
      - pre-event-network

  logstash:
    container_name: pre-event-logstash
    image: logstash:9.3.2
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m  # Giới hạn JVM heap Logstash
    volumes:
      - ./elk/pipeline:/usr/share/logstash/pipeline  # Thư mục chứa *.conf — Logstash tự load tất cả file trong này
      - ./elk/logstash.yml:/usr/share/logstash/config/logstash.yml  # Config chung của Logstash (monitoring, http.host...)
    ports:
      - "5044:5044"  # TCP input — Spring Boot gửi log JSON đến đây (xem pipeline/logstash.conf)
      - "9600:9600"  # Logstash monitoring API — kiểm tra health, pipeline stats
    depends_on:
      - elasticsearch  # Đảm bảo ES sẵn sàng trước khi Logstash khởi động và kết nối output
    networks:
      - pre-event-network

  kibana:
    container_name: pre-event-kibana
    image: kibana:9.3.2
    restart: unless-stopped
    volumes:
      - ./elk/kibana.yml:/usr/share/kibana/config/kibana.yml  # Override config: trỏ ES host, tắt monitoring UI
    ports:
      - "5601:5601"  # Kibana UI — truy cập http://localhost:5601
    depends_on:
      - elasticsearch  # Kibana cần ES đã chạy để đăng ký index patterns khi khởi động
    networks:
      - pre-event-network
