# ================================================================
# Logstash Pipeline — nhận log từ Spring Boot và đẩy vào Elasticsearch
#
# Flow: Spring Boot →(TCP JSON)→ [input] → [filter] → [output] → Elasticsearch
# ================================================================

input {
  tcp {
    host => "0.0.0.0"
    port => 5044        # Spring Boot kết nối đến container:5044 (host cũng map 5044:5044)
    codec => json_lines # Mỗi dòng là 1 JSON object — logstash-logback-encoder tự format đúng kiểu này
  }
}

filter {
  # Hiện tại không transform gì thêm.
  # Có thể bổ sung sau:
  #   - grok: parse log message dạng text thành các field có cấu trúc
  #   - mutate: đổi tên field, thêm field cố định (vd: environment = "dev")
  #   - date: parse timestamp từ log thành @timestamp chuẩn của ES
}

output {
  elasticsearch {
    hosts => "http://elasticsearch:9200"  # Tên container ES — cùng Docker network nên resolve được
    index => "pre-ticket-%{+YYYY.MM.dd}"  # Index theo ngày → dễ xóa log cũ, tránh index phình to
    ecs_compatibility => disabled         # Tắt ECS format — dùng field name gốc của logback encoder
  }

  # Uncomment để debug pipeline — in raw event ra stdout của Logstash container
  # stdout { codec => rubydebug }
}
